<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Love You Budi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ff6b6b, #ff8787, #ffa5a5);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Floating hearts animation */
        .heart {
            position: absolute;
            color: rgba(255, 255, 255, 0.3);
            font-size: 20px;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        .container {
            text-align: center;
            z-index: 10;
            padding: 20px;
        }

        h1 {
            font-size: 4rem;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .subtitle {
            font-size: 1.5rem;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            margin-bottom: 40px;
            font-style: italic;
        }

        .button-container {
            display: flex;
            gap: 30px;
            justify-content: center;
            align-items: center;
            margin-top: 30px;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            text-transform: uppercase;
        }

        .btn-yes {
            background: linear-gradient(45deg, #ff1744, #ff6b6b);
            color: white;
            font-size: 1.5rem;
            padding: 20px 40px;
            transform: scale(1.2);
        }

        .btn-yes:hover {
            transform: scale(1.3);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .btn-no {
            background: linear-gradient(45deg, #666, #999);
            color: white;
            font-size: 0.8rem;
            padding: 10px 20px;
            position: relative;
            transition: all 0.1s ease;
        }

        .btn-no:hover {
            transform: scale(0.9);
        }

        .love-message {
            display: none;
            font-size: 3rem;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            animation: fadeIn 1s ease-in;
            margin-top: 30px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }

        .hidden {
            display: none;
        }

        /* Sparkle effect */
        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            animation: sparkle 1s ease-in-out infinite;
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <!-- Floating hearts background -->
    <div class="heart" style="top: 10%; left: 10%;">❤️</div>
    <div class="heart" style="top: 20%; left: 80%; animation-delay: 1s;">❤️</div>
    <div class="heart" style="top: 60%; left: 20%; animation-delay: 2s;">❤️</div>
    <div class="heart" style="top: 80%; left: 70%; animation-delay: 3s;">❤️</div>
    <div class="heart" style="top: 40%; left: 50%; animation-delay: 4s;">❤️</div>
    <div class="heart" style="top: 70%; left: 30%; animation-delay: 5s;">❤️</div>

    <div class="container">
        <h1>I love you Budi</h1>
        <p class="subtitle">aaja surprise hunxa</p>
        
        <div class="button-container" id="buttonContainer">
            <button class="btn btn-yes" id="yesBtn">Yes</button>
            <button class="btn btn-no" id="noBtn">No</button>
        </div>
        
        <div class="love-message" id="loveMessage">
            I LOVE YOU BUDI 💕
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const buttonContainer = document.getElementById('buttonContainer');
        const loveMessage = document.getElementById('loveMessage');
        
        // Make No button move when hovered
        noBtn.addEventListener('mouseenter', function() {
            const containerRect = buttonContainer.getBoundingClientRect();
            const btnRect = noBtn.getBoundingClientRect();
            
            // Calculate random position within container
            const maxX = containerRect.width - btnRect.width - 50;
            const maxY = window.innerHeight - btnRect.height - 100;
            
            const randomX = Math.random() * maxX;
            const randomY = Math.random() * maxY;
            
            // Apply random position
            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        });
        
        // Yes button click handler
        yesBtn.addEventListener('click', function() {
            // Hide buttons
            buttonContainer.classList.add('hidden');
            
            // Show love message with animation
            loveMessage.style.display = 'block';
            
            // Add sparkles
            createSparkles();
        });
        
        function createSparkles() {
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const sparkle = document.createElement('div');
                    sparkle.className = 'sparkle';
                    sparkle.style.left = Math.random() * window.innerWidth + 'px';
                    sparkle.style.top = Math.random() * window.innerHeight + 'px';
                    sparkle.style.animationDelay = Math.random() * 2 + 's';
                    document.body.appendChild(sparkle);
                    
                    // Remove sparkle after animation
                    setTimeout(() => sparkle.remove(), 3000);
                }, i * 100);
            }
        }
        
        // Add some interactive hearts on click
        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('heart')) return;
            
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.style.position = 'fixed';
            heart.style.left = e.clientX + 'px';
            heart.style.top = e.clientY + 'px';
            heart.style.fontSize = '20px';
            heart.style.pointerEvents = 'none';
            heart.style.animation = 'float 2s ease-out forwards';
            heart.style.opacity = '0.8';
            document.body.appendChild(heart);
            
            setTimeout(() => heart.remove(), 2000);
        });
    </script>
</body>
</html>
